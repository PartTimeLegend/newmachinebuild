name: CICD
permissions:
  contents: read
  pull-requests: write
on:
  push:
    paths-ignore:
    - "**.md"
    - ".mergify.yml"
    - "LICENSE"
    - ".github/CODEOWNERS"
    - ".github/PULL_REQUEST_TEMPLATE.md"
    - ".github/labeler.yml"
    - ".github/FUNDING.yml"
    - ".github/workflows/autoupdate.yml"
    - ".github/workflows/labeler.yml"
    - ".github/workflows/size-label.yml"
    branches: [ master ]
  pull_request:
    paths-ignore:
    - "**.md"
    - ".mergify.yml"
    - "LICENSE"
    - ".github/CODEOWNERS"
    - ".github/PULL_REQUEST_TEMPLATE.md"
    - ".github/labeler.yml"
    - ".github/FUNDING.yml"
    - ".github/workflows/autoupdate.yml"
    - ".github/workflows/labeler.yml"
    - ".github/workflows/size-label.yml"
    branches: [ master ]
  schedule:
    - cron:  '0 0 * * *'
  workflow_dispatch:

  
jobs:
  bash:
    name: Bash
    strategy:
      matrix:
        os: [macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Run script
      run: ./NewMachineSetup.sh
      shell: bash
  tag:
    name: Tag Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: '0'
    - name: Bump version and push tag
      uses: anothrNick/github-tag-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        WITH_V: true
